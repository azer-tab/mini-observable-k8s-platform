groups:
  - name: api_alerts
    interval: 30s
    rules:
      # ── 1. API down ─────────────────────────────────────────────────────────
      - alert: ApiDown
        expr: up{job="api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API is down"
          description: "The API has been unreachable for more than 1 minute."

      # ── 2. High error rate ───────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
          /
          rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 5% of requests are returning 5xx over the last 5 minutes."

      # ── 3. High latency ──────────────────────────────────────────────────────
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "95th-percentile latency exceeds 1 second over the last 5 minutes."
