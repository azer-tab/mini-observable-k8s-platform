global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yaml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI backend (Docker Compose network)
  - job_name: api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

